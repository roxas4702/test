<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteApp Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ================= Variabili di Sistema ================= */
        :root {
            --bg-color: #f4f7f6;
            --sidebar-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #888888;
            --accent-color: #4a90e2;
            --accent-hover: #357abd;
            --border-color: #e1e4e8;
            --shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ================= Layout & Sidebar ================= */
        .sidebar {
            width: 280px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .sidebar-header {
            padding: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent-color);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-btn {
            display: none;
            background: none;
            border: none;
            font-size: 1.2rem;
            color: var(--text-muted);
            cursor: pointer;
        }

        .btn-new-note {
            margin: 20px;
            padding: 12px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-new-note:hover {
            background-color: var(--accent-hover);
        }

        .menu-section {
            padding: 10px 20px;
        }

        .menu-section h3 {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .menu-list {
            list-style: none;
        }

        .menu-list li {
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-main);
            transition: background 0.2s;
        }

        .menu-list li:hover, .menu-list li.active {
            background-color: var(--bg-color);
            color: var(--accent-color);
        }

        .menu-list li i {
            color: var(--text-muted);
        }

        .menu-list li:hover i, .menu-list li.active i {
            color: var(--accent-color);
        }

        /* ================= Main Content ================= */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background: #ffffff;
        }

        /* Header con hamburger menu */
        .top-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--text-main);
            cursor: pointer;
        }

        .note-title-input {
            border: none;
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--text-main);
            outline: none;
            width: 100%;
        }

        /* Toolbar di Formattazione */
        .toolbar {
            padding: 10px 20px;
            background-color: var(--bg-color);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .toolbar button {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 8px 12px;
            cursor: pointer;
            color: var(--text-main);
            transition: all 0.2s;
        }

        .toolbar button:hover {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        /* Editor */
        .editor-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .editor {
            min-height: 100%;
            outline: none;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .editor[placeholder]:empty:before {
            content: attr(placeholder);
            color: var(--text-muted);
            pointer-events: none;
            display: block; /* For Firefox */
        }

        /* Overlay per Mobile */
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }

        /* ================= Responsive Design ================= */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                height: 100%;
                transform: translateX(-100%);
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .menu-toggle {
                display: block;
            }

            .close-btn {
                display: block;
            }

            .overlay.show {
                display: block;
            }
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay"></div>

    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span><i class="fas fa-book-open"></i> NoteApp</span>
            <button class="close-btn" id="close-menu"><i class="fas fa-times"></i></button>
        </div>
        
        <button class="btn-new-note" onclick="clearNote()">
            <i class="fas fa-plus"></i> Nuova Nota
        </button>

        <div class="menu-section">
            <h3>Cartelle</h3>
            <ul class="menu-list">
                <li class="active"><i class="fas fa-folder"></i> Tutte le note</li>
                <li><i class="fas fa-folder"></i> Lavoro</li>
                <li><i class="fas fa-folder"></i> Personale</li>
                <li><i class="fas fa-folder"></i> Idee</li>
            </ul>
        </div>

        <div class="menu-section">
            <h3>Tags</h3>
            <ul class="menu-list">
                <li><i class="fas fa-hashtag"></i> urgente</li>
                <li><i class="fas fa-hashtag"></i> da-fare</li>
                <li><i class="fas fa-hashtag"></i> meeting</li>
            </ul>
        </div>
    </nav>

    <main class="main-content">
        <header class="top-header">
            <button class="menu-toggle" id="open-menu"><i class="fas fa-bars"></i></button>
            <input type="text" id="note-title" class="note-title-input" placeholder="Titolo della nota...">
        </header>

        <div class="toolbar">
            <button onclick="formatText('bold')" title="Grassetto"><i class="fas fa-bold"></i></button>
            <button onclick="formatText('italic')" title="Corsivo"><i class="fas fa-italic"></i></button>
            <button onclick="formatText('underline')" title="Sottolineato"><i class="fas fa-underline"></i></button>
            <button onclick="formatText('insertUnorderedList')" title="Elenco Puntato"><i class="fas fa-list-ul"></i></button>
            <button onclick="formatText('insertOrderedList')" title="Elenco Numerato"><i class="fas fa-list-ol"></i></button>
        </div>

        <div class="editor-container">
            <div id="editor" class="editor" contenteditable="true" placeholder="Inizia a scrivere la tua nota qui..."></div>
        </div>
    </main>

    <script>
        // --- Gestione Menu Responsivo ---
        const sidebar = document.getElementById('sidebar');
        const openMenuBtn = document.getElementById('open-menu');
        const closeMenuBtn = document.getElementById('close-menu');
        const overlay = document.getElementById('overlay');

        function toggleMenu() {
            sidebar.classList.toggle('open');
            overlay.classList.toggle('show');
        }

        openMenuBtn.addEventListener('click', toggleMenu);
        closeMenuBtn.addEventListener('click', toggleMenu);
        overlay.addEventListener('click', toggleMenu);

        // --- Gestione Formattazione Testo ---
        function formatText(command) {
            // execCommand è il metodo nativo del browser per formattare nei div contenteditable
            document.execCommand(command, false, null);
            document.getElementById('editor').focus();
        }

        // --- Salvataggio e Caricamento Locale ---
        const editor = document.getElementById('editor');
        const titleInput = document.getElementById('note-title');

        // Carica i dati salvati all'avvio
        window.onload = () => {
            const savedTitle = localStorage.getItem('noteTitle');
            const savedContent = localStorage.getItem('noteContent');
            
            if (savedTitle) titleInput.value = savedTitle;
            if (savedContent) editor.innerHTML = savedContent;
        };

        // Salva i dati ad ogni modifica
        editor.addEventListener('input', () => {
            localStorage.setItem('noteContent', editor.innerHTML);
        });

        titleInput.addEventListener('input', () => {
            localStorage.setItem('noteTitle', titleInput.value);
        });

        // Funzione per ripulire la nota (Nuova Nota)
        function clearNote() {
            if(confirm("Vuoi iniziare una nuova nota? Questo cancellerà il testo attuale se non lo hai copiato altrove.")) {
                editor.innerHTML = '';
                titleInput.value = '';
                localStorage.removeItem('noteContent');
                localStorage.removeItem('noteTitle');
                
                // Chiude il menu se siamo su mobile
                if(window.innerWidth <= 768) {
                    toggleMenu();
                }
            }
        }
    </script>
</body>
</html>
