<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteApp Advanced</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

    <style>
        :root {
            --bg-body: #f8f9fa;
            --bg-sidebar: #ffffff;
            --text-main: #2d3436;
            --text-light: #636e72;
            --accent: #0984e3;
            --accent-hover: #74b9ff;
            --border: #dfe6e9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body { display: flex; height: 100vh; background-color: var(--bg-body); color: var(--text-main); overflow: hidden; }

        /* --- SIDEBAR (Cartelle e Lista Note) --- */
        .sidebar {
            width: 320px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-new {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 15px;
            transition: 0.2s;
        }
        .btn-new:hover { background: var(--accent-hover); }

        .folders {
            padding: 15px;
            border-bottom: 1px solid var(--border);
        }

        .folder-item {
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 6px;
            color: var(--text-light);
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
            transition: 0.2s;
        }

        .folder-item.active, .folder-item:hover {
            background: var(--bg-body);
            color: var(--accent);
            font-weight: bold;
        }

        .notes-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .note-card {
            padding: 15px;
            background: white;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .note-card.active { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(9, 132, 227, 0.2); }
        .note-card:hover { transform: translateY(-2px); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .note-card-title { font-weight: bold; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .note-card-tags { font-size: 0.75rem; color: var(--accent); }

        /* --- MAIN AREA (Editor) --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
            position: relative;
        }

        .editor-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .top-bar { display: flex; gap: 10px; align-items: center; }

        .menu-toggle {
            display: none;
            background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-main);
        }

        .title-input {
            flex: 1;
            font-size: 2rem;
            font-weight: bold;
            border: none;
            outline: none;
            color: var(--text-main);
        }

        .meta-inputs { display: flex; gap: 15px; }
        
        .meta-inputs select, .meta-inputs input {
            padding: 8px;
            border: 1px solid var(--border);
            border-radius: 6px;
            outline: none;
            font-size: 0.9rem;
        }

        .meta-inputs input { flex: 1; }

        .btn-delete {
            background: #ff7675; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer;
        }

        #editor-container { flex: 1; border: none; font-size: 1.1rem; }
        .ql-toolbar.ql-snow { border: none; border-bottom: 1px solid var(--border); background: var(--bg-body); padding: 10px; }
        .ql-container.ql-snow { border: none; }

        .overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 900;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .sidebar { position: fixed; height: 100%; transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .menu-toggle { display: block; }
            .overlay.show { display: block; }
            .meta-inputs { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2><i class="fas fa-book"></i> Notes</h2>
            <button class="btn-new" onclick="createNewNote()"><i class="fas fa-plus"></i> Nuova</button>
        </div>
        
        <div class="folders">
            <div class="folder-item active" onclick="setFilter('Tutte')"><i class="fas fa-inbox"></i> Tutte le note</div>
            <div class="folder-item" onclick="setFilter('Lavoro')"><i class="fas fa-briefcase"></i> Lavoro</div>
            <div class="folder-item" onclick="setFilter('Personale')"><i class="fas fa-user"></i> Personale</div>
            <div class="folder-item" onclick="setFilter('Idee')"><i class="fas fa-lightbulb"></i> Idee</div>
        </div>

        <div class="notes-list" id="notes-list">
            </div>
    </aside>

    <main class="main-content">
        <div class="editor-header">
            <div class="top-bar">
                <button class="menu-toggle" id="btn-menu" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
                <input type="text" class="title-input" id="note-title" placeholder="Titolo della nota..." disabled>
                <button class="btn-delete" id="btn-delete" onclick="deleteCurrentNote()" style="display: none;"><i class="fas fa-trash"></i></button>
            </div>
            <div class="meta-inputs">
                <select id="note-folder" disabled>
                    <option value="Lavoro">Lavoro</option>
                    <option value="Personale">Personale</option>
                    <option value="Idee">Idee</option>
                </select>
                <input type="text" id="note-tags" placeholder="Tags (separati da virgola, es: urgente, progetto)" disabled>
            </div>
        </div>
        <div id="editor-container"></div>
    </main>

    <script>
        // Inizializzazione Quill.js (Editor avanzato)
        const quill = new Quill('#editor-container', {
            theme: 'snow',
            placeholder: 'Seleziona o crea una nota per iniziare a scrivere...',
            modules: {
                toolbar: [
                    [{ 'header': [1, 2, 3, false] }],
                    ['bold', 'italic', 'underline', 'strike'],
                    [{ 'color': [] }, { 'background': [] }],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    ['clean']
                ]
            }
        });
        quill.disable(); // Disabilita l'editor all'avvio finché non si crea/seleziona una nota

        // --- GESTIONE STATO ---
        let notes = JSON.parse(localStorage.getItem('myNotesData')) || [];
        let currentNoteId = null;
        let currentFilter = 'Tutte';

        // Elementi DOM
        const titleInput = document.getElementById('note-title');
        const folderSelect = document.getElementById('note-folder');
        const tagsInput = document.getElementById('note-tags');
        const notesListContainer = document.getElementById('notes-list');
        const btnDelete = document.getElementById('btn-delete');

        // --- FUNZIONI PRINCIPALI ---

        function renderNotes() {
            notesListContainer.innerHTML = '';
            
            // Filtra le note in base alla cartella selezionata
            const filteredNotes = currentFilter === 'Tutte' 
                ? notes 
                : notes.filter(n => n.folder === currentFilter);

            filteredNotes.forEach(note => {
                const div = document.createElement('div');
                div.className = `note-card ${note.id === currentNoteId ? 'active' : ''}`;
                div.onclick = () => loadNote(note.id);
                
                // Formatta i tag per la preview
                const tagsHtml = note.tags ? `<div class="note-card-tags"><i class="fas fa-hashtag"></i> ${note.tags}</div>` : '';
                
                div.innerHTML = `
                    <div class="note-card-title">${note.title || 'Nuova Nota'}</div>
                    ${tagsHtml}
                `;
                notesListContainer.appendChild(div);
            });
        }

        function createNewNote() {
            const newNote = {
                id: Date.now(), // ID univoco basato sul timestamp
                title: '',
                content: '',
                folder: currentFilter === 'Tutte' ? 'Idee' : currentFilter,
                tags: ''
            };
            notes.unshift(newNote); // Aggiunge all'inizio dell'array
            saveToLocalStorage();
            loadNote(newNote.id);
            if(window.innerWidth <= 768) toggleMenu(); // Chiude il menu su mobile
        }

        function loadNote(id) {
            currentNoteId = id;
            const note = notes.find(n => n.id === id);
            
            if (note) {
                // Abilita gli input
                quill.enable();
                titleInput.disabled = false;
                folderSelect.disabled = false;
                tagsInput.disabled = false;
                btnDelete.style.display = 'block';

                // Carica i dati
                titleInput.value = note.title;
                folderSelect.value = note.folder;
                tagsInput.value = note.tags;
                
                // Evita di registrare il caricamento iniziale come una modifica dell'utente
                quill.root.innerHTML = note.content; 
                
                renderNotes(); // Aggiorna la classe 'active' nella lista
            }
        }

        function saveCurrentNote() {
            if (!currentNoteId) return;
            
            const noteIndex = notes.findIndex(n => n.id === currentNoteId);
            if (noteIndex !== -1) {
                notes[noteIndex].title = titleInput.value;
                notes[noteIndex].folder = folderSelect.value;
                notes[noteIndex].tags = tagsInput.value;
                notes[noteIndex].content = quill.root.innerHTML;
                
                saveToLocalStorage();
                renderNotes(); // Aggiorna i titoli nella lista in tempo reale
            }
        }

        function deleteCurrentNote() {
            if(confirm('Sei sicuro di voler eliminare questa nota?')) {
                notes = notes.filter(n => n.id !== currentNoteId);
                currentNoteId = null;
                
                // Svuota e disabilita l'editor
                titleInput.value = '';
                tagsInput.value = '';
                quill.root.innerHTML = '';
                quill.disable();
                titleInput.disabled = true;
                folderSelect.disabled = true;
                tagsInput.disabled = true;
                btnDelete.style.display = 'none';

                saveToLocalStorage();
                renderNotes();
            }
        }

        function setFilter(folderName) {
            currentFilter = folderName;
            
            // Aggiorna interfaccia cartelle attive
            document.querySelectorAll('.folder-item').forEach(el => {
                el.classList.remove('active');
                if(el.innerText.includes(folderName) || (folderName==='Tutte' && el.innerText.includes('Tutte'))) {
                    el.classList.add('active');
                }
            });
            renderNotes();
        }

        function saveToLocalStorage() {
            localStorage.setItem('myNotesData', JSON.stringify(notes));
        }

        // --- EVENT LISTENERS PER SALVATAGGIO AUTOMATICO ---
        
        titleInput.addEventListener('input', saveCurrentNote);
        folderSelect.addEventListener('change', () => { saveCurrentNote(); renderNotes(); });
        tagsInput.addEventListener('input', saveCurrentNote);
        quill.on('text-change', saveCurrentNote);

        // --- MENU MOBILE ---
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');

        function toggleMenu() {
            sidebar.classList.toggle('open');
            overlay.classList.toggle('show');
        }
        overlay.addEventListener('click', toggleMenu);

        // Avvio iniziale
        renderNotes();
    </script>
</body>
</html>
